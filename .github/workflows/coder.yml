name: Coder - Implement Solutions

on:
  schedule:
    - cron: '30 */6 * * *'
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to implement (leave empty for auto-pick)'
        required: false
        type: number

jobs:
  implement:
    if: github.actor == 'jackbauertv24-droid' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Find issue to work on
        id: find-issue
        run: |
          if [[ -n "${{ inputs.issue_number }}" ]]; then
            echo "number=${{ inputs.issue_number }}" >> $GITHUB_OUTPUT
            echo "found=true" >> $GITHUB_OUTPUT
          else
            ISSUE=$(gh issue list \
              --state open \
              --label approved \
              --json number,title,body \
              --jq 'first | @base64' 2>/dev/null || echo "")
            
            if [[ -n "$ISSUE" ]]; then
              NUMBER=$(echo "$ISSUE" | base64 -d | jq -r '.number')
              echo "number=$NUMBER" >> $GITHUB_OUTPUT
              echo "found=true" >> $GITHUB_OUTPUT
              echo "::notice::Found approved issue #$NUMBER"
            else
              echo "found=false" >> $GITHUB_OUTPUT
              echo "::notice::No approved issues to work on"
            fi
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Exit if no issue
        if: steps.find-issue.outputs.found != 'true'
        run: exit 0

      - name: Get issue details
        id: issue
        run: |
          DATA=$(gh issue view ${{ steps.find-issue.outputs.number }} --json title,body)
          echo "title=$(echo "$DATA" | jq -r '.title')" >> $GITHUB_OUTPUT
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$DATA" | jq -r '.body' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Mark issue as in-progress
        id: mark-progress
        run: |
          gh issue edit ${{ steps.find-issue.outputs.number }} --add-label "in-progress"
          gh issue comment ${{ steps.find-issue.outputs.number }} --body "Starting implementation for this issue."
          echo "marked=true" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create feature branch
        run: |
          git checkout -b feature/issue-${{ steps.find-issue.outputs.number }}

      - name: Configure Git
        run: |
          git config user.name "AI Coder"
          git config user.email "coder@opencode-runner.local"

      - name: Install OpenCode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Add OpenCode to PATH
        run: echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Run Coder Agent
        id: code
        timeout-minutes: 10
        working-directory: ./project
        run: |
          PROMPT=$(cat ../.github/agent-prompts/coder.md | \
            sed "s/{{ issue_number }}/${{ steps.find-issue.outputs.number }}/g" | \
            sed "s/{{ issue_title }}/${{ steps.issue.outputs.title }}/g")
          opencode run "$PROMPT" --model "tencent-coding-plan/glm-5" 2>&1 | tee /tmp/coder-output.txt || echo "code_failed=true" >> $GITHUB_OUTPUT
        env:
          TENCENT_CODING_PLAN_API_KEY: ${{ secrets.TENCENT_CODING_PLAN_API_KEY }}

      - name: Validate changes in project/ only
        id: validate
        run: |
          git fetch origin master
          CHANGED_FILES=$(git diff --name-only origin/master -- project/)
          if [[ -z "$CHANGED_FILES" ]]; then
            echo "::warning::No changes made in project/"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          for file in $(git diff --name-only origin/master); do
            if [[ ! "$file" =~ ^project/ ]]; then
              echo "::error::Violation: $file is outside project/"
              git checkout .
              echo "valid=false" >> $GITHUB_OUTPUT
              exit 1
            fi
          done
          echo "valid=true" >> $GITHUB_OUTPUT
          echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        id: commit
        if: steps.validate.outputs.valid == 'true' && steps.validate.outputs.has_changes == 'true'
        run: |
          git add project/
          git commit -m "feat: implement issue #${{ steps.find-issue.outputs.number }} - ${{ steps.issue.outputs.title }}" || echo "No changes to commit"
          git push origin feature/issue-${{ steps.find-issue.outputs.number }} || echo "Nothing to push"
          echo "committed=true" >> $GITHUB_OUTPUT

      - name: Create PR
        id: create-pr
        if: steps.commit.outputs.committed == 'true'
        run: |
          PR_BODY="Closes #${{ steps.find-issue.outputs.number }}

          ## Implementation
          This PR implements the solution for issue #${{ steps.find-issue.outputs.number }}.

          ## Testing
          Please review the implementation and test coverage."
          
          PR_URL=$(gh pr create \
            --title "Implement: ${{ steps.issue.outputs.title }}" \
            --body "$PR_BODY" \
            --label "needs-review" --json url 2>/dev/null || echo "")
          
          if [[ -n "$PR_URL" ]]; then
            PR_NUM=$(echo "$PR_URL" | jq -r '.url' | grep -oE '[0-9]+')
            echo "pr_number=$PR_NUM" >> $GITHUB_OUTPUT
            echo "pr_url=$(echo "$PR_URL" | jq -r '.url')" >> $GITHUB_OUTPUT
            echo "created=true" >> $GITHUB_OUTPUT
          else
            echo "created=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update issue after PR created
        if: steps.create-pr.outputs.created == 'true'
        run: |
          gh issue edit ${{ steps.find-issue.outputs.number }} --remove-label "in-progress"
          gh issue comment ${{ steps.find-issue.outputs.number }} --body "PR #${{ steps.create-pr.outputs.pr_number }} ready for review: ${{ steps.create-pr.outputs.pr_url }}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Handle failure - remove in-progress
        if: steps.mark-progress.outputs.marked == 'true' && steps.create-pr.outputs.created != 'true'
        run: |
          gh issue edit ${{ steps.find-issue.outputs.number }} --remove-label "in-progress"
          gh issue comment ${{ steps.find-issue.outputs.number }} --body "Implementation failed or no changes made. Issue is available for re-assignment."
        env:
          GH_TOKEN: ${{ github.token }}