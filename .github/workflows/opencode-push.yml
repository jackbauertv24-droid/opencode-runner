name: opencode-push

on:
  push:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Task to execute'
        required: false
        type: string
        default: ''

jobs:
  opencode:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install OpenCode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Add OpenCode to PATH
        run: echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Run OpenCode
        run: |
          opencode run "${{ inputs.prompt || 'Analyze the recent changes and verify code quality' }}"
        env:
          VOLCES_ARK_API_KEY: ${{ secrets.VOLCES_ARK_API_KEY }}