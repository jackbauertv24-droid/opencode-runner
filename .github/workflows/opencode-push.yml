name: opencode-push

on:
  push:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Task to execute (overrides default)'
        required: false
        type: string
        default: ''

jobs:
  opencode:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          VOLCES_ARK_API_KEY: ${{ secrets.VOLCES_ARK_API_KEY }}
        with:
          model: ${{ vars.DEFAULT_MODEL || 'volces-ark/ark-code-latest' }}
          prompt: ${{ inputs.prompt || 'Analyze the recent changes and verify code quality. Check for any potential issues or improvements.' }}
          agent: ${{ vars.DEFAULT_AGENT || 'build' }}
          share: true