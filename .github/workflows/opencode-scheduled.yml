name: opencode-scheduled

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Task to execute'
        required: true
        type: string
      model:
        description: 'Model to use'
        required: false
        type: string
        default: 'volces-ark/ark-code-latest'

jobs:
  opencode:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install OpenCode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Add OpenCode to PATH
        run: echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Run OpenCode
        run: opencode run "${{ inputs.prompt || 'Review the codebase for improvements' }}"
        env:
          VOLCES_ARK_API_KEY: ${{ secrets.VOLCES_ARK_API_KEY }}