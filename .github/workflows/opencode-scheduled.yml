name: opencode-scheduled

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Task to execute'
        required: true
        type: string
      model:
        description: 'Model to use (format: provider/model)'
        required: false
        type: string
        default: ''

jobs:
  opencode:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_CONFIG_CONTENT: ${{ secrets.OPENCODE_CONFIG }}
          VOLCES_ARK_API_KEY: ${{ secrets.VOLCES_ARK_API_KEY }}
          CUSTOM_OPENAI_API_KEY: ${{ secrets.CUSTOM_OPENAI_API_KEY }}
          CUSTOM_ANTHROPIC_API_KEY: ${{ secrets.CUSTOM_ANTHROPIC_API_KEY }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: ${{ inputs.model || vars.DEFAULT_MODEL || 'custom-provider/model-name' }}
          prompt: ${{ inputs.prompt || vars.DEFAULT_PROMPT || 'Review the codebase and check for any improvements.' }}
          agent: ${{ vars.DEFAULT_AGENT || 'build' }}
          share: true