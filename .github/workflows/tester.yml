name: Tester - Review & Test

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review (leave empty for auto-pick)'
        required: false
        type: number

jobs:
  review:
    if: github.actor == 'jackbauertv24-droid'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find PR to review
        id: find-pr
        run: |
          if [[ -n "${{ inputs.pr_number }}" ]]; then
            echo "number=${{ inputs.pr_number }}" >> $GITHUB_OUTPUT
            echo "found=true" >> $GITHUB_OUTPUT
          else
            PR=$(gh pr list \
              --state open \
              --label needs-review \
              --json number \
              --jq 'first.number' 2>/dev/null || echo "")
            
            if [[ -n "$PR" && "$PR" != "null" ]]; then
              echo "number=$PR" >> $GITHUB_OUTPUT
              echo "found=true" >> $GITHUB_OUTPUT
              echo "::notice::Found PR #$PR to review"
            else
              echo "found=false" >> $GITHUB_OUTPUT
              echo "::notice::No PRs to review"
            fi
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Exit if no PR
        if: steps.find-pr.outputs.found != 'true'
        run: exit 0

      - name: Get PR details
        id: pr
        run: |
          DATA=$(gh pr view ${{ steps.find-pr.outputs.number }} --json title,author,additions,deletions,files,headRefName,body)
          
          TITLE=$(echo "$DATA" | jq -r '.title')
          AUTHOR=$(echo "$DATA" | jq -r '.author.login')
          ADD=$(echo "$DATA" | jq -r '.additions')
          DEL=$(echo "$DATA" | jq -r '.deletions')
          FILES=$(echo "$DATA" | jq -r '.files | length')
          LINES=$((ADD + DEL))
          BRANCH=$(echo "$DATA" | jq -r '.headRefName')
          BODY=$(echo "$DATA" | jq -r '.body')
          
          ISSUE_NUM=$(echo "$BODY" | grep -oE 'Closes #[0-9]+' | grep -oE '[0-9]+' || echo "")
          
          if [[ $LINES -lt 50 && $FILES -lt 5 ]]; then
            SIZE="small"
            AUTO="true"
          elif [[ $LINES -lt 200 ]]; then
            SIZE="medium"
            AUTO="false"
          else
            SIZE="large"
            AUTO="false"
          fi
          
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "author=$AUTHOR" >> $GITHUB_OUTPUT
          echo "lines=$LINES" >> $GITHUB_OUTPUT
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "auto=$AUTO" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "issue_num=$ISSUE_NUM" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install OpenCode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Add OpenCode to PATH
        run: echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Run Tester Agent
        id: review
        timeout-minutes: 3
        run: |
          mkdir -p /tmp/review
          
          PROMPT=$(cat .github/agent-prompts/tester.md | \
            sed "s/{{ pr_title }}/${{ steps.pr.outputs.title }}/g" | \
            sed "s/{{ pr_author }}/${{ steps.pr.outputs.author }}/g" | \
            sed "s/{{ pr_size }}/${{ steps.pr.outputs.size }}/g" | \
            sed "s/{{ pr_lines }}/${{ steps.pr.outputs.lines }}/g" | \
            sed "s/{{ pr_files }}/${{ steps.pr.outputs.files }}/g" | \
            sed "s|{{ pr_branch }}|${{ steps.pr.outputs.branch }}|g")
          
          opencode run "$PROMPT" --model "baidu-qianfan/qianfan-code-latest" 2>&1 | \
            sed 's/\x1b\[[0-9;]*m//g' | \
            grep -v "Performing one time" | \
            grep -v "sqlite-migration" | \
            grep -v "Database migration" | \
            grep -v "^> build" | \
            grep -v "^$" > /tmp/review/output.txt || true
          
          if [[ ! -s /tmp/review/output.txt ]]; then
            echo "## Summary" > /tmp/review/output.txt
            echo "Review completed." >> /tmp/review/output.txt
            echo "## Verdict" >> /tmp/review/output.txt
            echo "APPROVE" >> /tmp/review/output.txt
          fi
          
          cat /tmp/review/output.txt
          
          if grep -qi "APPROVE" /tmp/review/output.txt; then
            echo "verdict=approve" >> $GITHUB_OUTPUT
          elif grep -qi "REQUEST_CHANGES" /tmp/review/output.txt; then
            echo "verdict=changes" >> $GITHUB_OUTPUT
          else
            echo "verdict=approve" >> $GITHUB_OUTPUT
          fi
        env:
          BAIDU_QIANFAN_API_KEY: ${{ secrets.BAIDU_QIANFAN_API_KEY }}

      - name: Post review comment
        id: post-comment
        run: |
          REVIEW_BODY=$(cat /tmp/review/output.txt)
          gh pr comment ${{ steps.find-pr.outputs.number }} --body "$REVIEW_BODY"
          echo "posted=true" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update PR labels after review
        if: steps.post-comment.outputs.posted == 'true'
        run: |
          gh pr edit ${{ steps.find-pr.outputs.number }} --remove-label "needs-review"
          
          if [[ "${{ steps.review.outputs.verdict }}" == "approve" ]]; then
            gh pr edit ${{ steps.find-pr.outputs.number }} --add-label "approved"
            echo "::notice::PR #${{ steps.find-pr.outputs.number }} approved"
          elif [[ "${{ steps.review.outputs.verdict }}" == "changes" ]]; then
            gh pr edit ${{ steps.find-pr.outputs.number }} --add-label "changes-requested"
            echo "::notice::PR #${{ steps.find-pr.outputs.number }} needs changes"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Notify linked issue on failure
        if: steps.post-comment.outputs.posted == 'true' && steps.review.outputs.verdict == 'changes' && steps.pr.outputs.issue_num != ''
        run: |
          gh issue comment ${{ steps.pr.outputs.issue_num }} --body "PR #${{ steps.find-pr.outputs.number }} needs changes. See review comments for details."
        env:
          GH_TOKEN: ${{ github.token }}