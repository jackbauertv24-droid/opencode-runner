name: Tester - Review & Test

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review (leave empty for auto-pick)'
        required: false
        type: number

jobs:
  review:
    if: github.actor == 'jackbauertv24-droid' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find PR to review
        id: find-pr
        run: |
          if [[ -n "${{ inputs.pr_number }}" ]]; then
            echo "number=${{ inputs.pr_number }}" >> $GITHUB_OUTPUT
            echo "found=true" >> $GITHUB_OUTPUT
          else
            PR=$(gh pr list \
              --state open \
              --label needs-review \
              --json number,title,author,additions,deletions,files \
              --jq 'first | @base64' 2>/dev/null || echo "")
            
            if [[ -n "$PR" ]]; then
              NUMBER=$(echo "$PR" | base64 -d | jq -r '.number')
              echo "number=$NUMBER" >> $GITHUB_OUTPUT
              echo "found=true" >> $GITHUB_OUTPUT
              echo "::notice::Found PR #$NUMBER to review"
            else
              echo "found=false" >> $GITHUB_OUTPUT
              echo "::notice::No PRs to review"
            fi
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Exit if no PR
        if: steps.find-pr.outputs.found != 'true'
        run: exit 0

      - name: Get PR details
        if: steps.find-pr.outputs.found == 'true'
        id: pr
        run: |
          DATA=$(gh pr view ${{ steps.find-pr.outputs.number }} --json title,author,additions,deletions,files,headRefName)
          
          TITLE=$(echo "$DATA" | jq -r '.title')
          AUTHOR=$(echo "$DATA" | jq -r '.author.login')
          ADD=$(echo "$DATA" | jq -r '.additions')
          DEL=$(echo "$DATA" | jq -r '.deletions')
          FILES=$(echo "$DATA" | jq -r '.files | length')
          LINES=$((ADD + DEL))
          BRANCH=$(echo "$DATA" | jq -r '.headRefName')
          
          if [[ $LINES -lt 50 && $FILES -lt 5 ]]; then
            SIZE="small"
            AUTO="true"
          elif [[ $LINES -lt 200 ]]; then
            SIZE="medium"
            AUTO="false"
          else
            SIZE="large"
            AUTO="false"
          fi
          
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "author=$AUTHOR" >> $GITHUB_OUTPUT
          echo "lines=$LINES" >> $GITHUB_OUTPUT
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "auto=$AUTO" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Install OpenCode
        if: steps.find-pr.outputs.found == 'true'
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Add OpenCode to PATH
        if: steps.find-pr.outputs.found == 'true'
        run: echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Run Tester Agent
        if: steps.find-pr.outputs.found == 'true'
        id: review
        working-directory: ./project
        run: |
          PROMPT=$(cat ../.github/agent-prompts/tester.md | \
            sed "s/{{ pr_title }}/${{ steps.pr.outputs.title }}/g" | \
            sed "s/{{ pr_author }}/${{ steps.pr.outputs.author }}/g" | \
            sed "s/{{ pr_size }}/${{ steps.pr.outputs.size }}/g" | \
            sed "s/{{ pr_lines }}/${{ steps.pr.outputs.lines }}/g" | \
            sed "s/{{ pr_files }}/${{ steps.pr.outputs.files }}/g" | \
            sed "s|{{ pr_branch }}|${{ steps.pr.outputs.branch }}|g")
          
          REVIEW=$(opencode run "$PROMPT" --model "baidu-qianfan/qianfan-code-latest" 2>&1)
          
          echo "review<<EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          BAIDU_QIANFAN_API_KEY: ${{ secrets.BAIDU_QIANFAN_API_KEY }}

      - name: Post review comment
        if: steps.find-pr.outputs.found == 'true'
        run: |
          gh pr comment ${{ steps.find-pr.outputs.number }} --body "${{ steps.review.outputs.review }}"
          gh pr edit ${{ steps.find-pr.outputs.number }} --remove-label "needs-review"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Auto-approve if eligible
        if: steps.find-pr.outputs.found == 'true' && steps.pr.outputs.auto == 'true'
        run: |
          if echo "${{ steps.review.outputs.review }}" | grep -qi "APPROVE"; then
            gh pr review ${{ steps.find-pr.outputs.number }} --approve --body "Auto-approved by Tester"
            echo "::notice::Auto-approved PR #${{ steps.find-pr.outputs.number }}"
          fi
        env:
          GH_TOKEN: ${{ github.token }}