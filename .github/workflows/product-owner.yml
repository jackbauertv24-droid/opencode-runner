name: Product Owner - Research & Planning

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      focus_area:
        description: 'Research focus area (e.g., performance, security, features)'
        required: false
        default: 'general improvement'
      priority:
        description: 'Issue priority to create'
        type: choice
        options:
          - 'P2-important'
          - 'P1-critical'
          - 'P3-nice-to-have'
        default: 'P2-important'

jobs:
  research:
    if: github.actor == 'jackbauertv24-droid'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check daily limits
        id: limits
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          ISSUES_TODAY=$(gh issue list --state all --search "created:>$TODAY" --json number --jq 'length' 2>/dev/null || echo "0")
          
          echo "issues_today=$ISSUES_TODAY" >> $GITHUB_OUTPUT
          
          if [[ $ISSUES_TODAY -ge 5 ]]; then
            echo "::warning::Daily issue limit (5) reached"
            echo "can_proceed=false" >> $GITHUB_OUTPUT
          else
            echo "can_proceed=true" >> $GITHUB_OUTPUT
          fi

      - name: Install OpenCode
        if: steps.limits.outputs.can_proceed == 'true'
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Add OpenCode to PATH
        if: steps.limits.outputs.can_proceed == 'true'
        run: echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Load Product Owner prompt
        if: steps.limits.outputs.can_proceed == 'true'
        id: prompt
        run: |
          PROMPT=$(cat .github/agent-prompts/product-owner.md)
          PROMPT="${PROMPT//'{{ focus_area }}'/'${{ inputs.focus_area }}'}"
          
          echo "prompt<<EOF" >> $GITHUB_OUTPUT
          echo "$PROMPT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run Product Owner Agent
        if: steps.limits.outputs.can_proceed == 'true'
        working-directory: ./project
        run: |
          opencode run "${{ steps.prompt.outputs.prompt }}" --model "volcengine-ark/ark-code-latest"
        env:
          VOLCENGINE_ARK_API_KEY: ${{ secrets.VOLCENGINE_ARK_API_KEY }}
          GH_TOKEN: ${{ github.token }}

      - name: Summary
        if: always()
        run: |
          echo "## Product Owner Run Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Focus**: ${{ inputs.focus_area }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Issues today**: ${{ steps.limits.outputs.issues_today }}/5" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ steps.limits.outputs.can_proceed == 'true' && 'Completed' || 'Skipped (limit reached)' }}" >> $GITHUB_STEP_SUMMARY