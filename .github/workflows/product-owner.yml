name: Product Owner - Research & Planning

on:
  workflow_dispatch:
    inputs:
      focus_area:
        description: 'Research focus area'
        required: false
        default: 'general improvement'

jobs:
  research:
    if: github.actor == 'jackbauertv24-droid' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check daily limits
        id: limits
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          ISSUES_TODAY=$(gh issue list --state all --search "created:>$TODAY" --json number --jq 'length' 2>/dev/null || echo "0")
          
          if [[ $ISSUES_TODAY -ge 5 ]]; then
            echo "::notice::Daily issue limit (5) reached"
            echo "can_proceed=false" >> $GITHUB_OUTPUT
          else
            echo "can_proceed=true" >> $GITHUB_OUTPUT
          fi

      - name: Install OpenCode
        if: steps.limits.outputs.can_proceed == 'true'
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Add OpenCode to PATH
        if: steps.limits.outputs.can_proceed == 'true'
        run: echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Load and run prompt
        if: steps.limits.outputs.can_proceed == 'true'
        working-directory: ./project
        run: |
          PROMPT=$(cat ../.github/agent-prompts/product-owner.md | sed "s/{{ focus_area }}/${{ inputs.focus_area || 'general improvement' }}/g")
          opencode run "$PROMPT" --model "volcengine-ark/ark-code-latest"
        env:
          VOLCENGINE_ARK_API_KEY: ${{ secrets.VOLCENGINE_ARK_API_KEY }}
          GH_TOKEN: ${{ github.token }}