name: opencode-manual

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Task to execute'
        required: true
        type: string
      model:
        description: 'Model to use (format: provider/model)'
        required: false
        type: string
        default: ''
      agent:
        description: 'Agent to use (build or plan)'
        required: false
        type: choice
        options:
          - 'build'
          - 'plan'
        default: 'build'

jobs:
  opencode:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          VOLCES_ARK_API_KEY: ${{ secrets.VOLCES_ARK_API_KEY }}
        with:
          model: ${{ inputs.model || 'volces-ark/ark-code-latest' }}
          prompt: ${{ inputs.prompt }}
          agent: ${{ inputs.agent }}
          share: true