name: opencode-manual

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Task to execute'
        required: true
        type: string
      model:
        description: 'Model to use (format: provider/model)'
        required: false
        type: string
        default: 'volces-ark/ark-code-latest'
      agent:
        description: 'Agent to use (build or plan)'
        required: false
        type: choice
        options:
          - 'build'
          - 'plan'
        default: 'build'

jobs:
  opencode:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install OpenCode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Add OpenCode to PATH
        run: echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Run OpenCode
        run: opencode run "${{ inputs.prompt }}" --model "${{ inputs.model }}"
        env:
          VOLCES_ARK_API_KEY: ${{ secrets.VOLCES_ARK_API_KEY }}