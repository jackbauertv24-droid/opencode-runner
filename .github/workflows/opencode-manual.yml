name: opencode-manual

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Task to execute'
        required: true
        type: string
      model:
        description: 'Model to use'
        required: false
        type: choice
        options:
          - 'volcengine-ark/ark-code-latest'
          - 'baidu-qianfan/qianfan-code-latest'
          - 'alibaba-coding-plan-cn/glm-5'
          - 'alibaba-coding-plan-cn/qwen3-coder-plus'
          - 'tencent-coding-plan/glm-5'
        default: 'volcengine-ark/ark-code-latest'

jobs:
  opencode:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install OpenCode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Add OpenCode to PATH
        run: echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Run OpenCode
        run: opencode run "${{ inputs.prompt }}" --model "${{ inputs.model }}"
        env:
          VOLCENGINE_ARK_API_KEY: ${{ secrets.VOLCENGINE_ARK_API_KEY }}
          BAIDU_QIANFAN_API_KEY: ${{ secrets.BAIDU_QIANFAN_API_KEY }}
          ALIBABA_CODING_PLAN_CN_API_KEY: ${{ secrets.ALIBABA_CODING_PLAN_CN_API_KEY }}
          TENCENT_CODING_PLAN_API_KEY: ${{ secrets.TENCENT_CODING_PLAN_API_KEY }}