name: opencode-debug

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Task to execute'
        required: true
        type: string

jobs:
  opencode:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install OpenCode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Add OpenCode to PATH
        run: echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Debug - Show config
        run: cat opencode.json

      - name: Debug - Validate JSON
        run: cat opencode.json | python3 -m json.tool

      - name: Run OpenCode
        run: opencode run "${{ inputs.prompt }}" --model volces-ark/ark-code-latest
        env:
          VOLCES_ARK_API_KEY: ${{ secrets.VOLCES_ARK_API_KEY }}